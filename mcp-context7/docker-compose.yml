# docker compose up --build -d

services:
  mcp-context7:
    build: 
      context: . 
      dockerfile: Dockerfile
    container_name: mcp-context7
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      - PORT=8010
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - NODE_ENV=production
      - PROTOCOL=SHTTP
    hostname: mcp-context7
    # domainname: local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/mcp/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # Ограничения ресурсов для стабильной работы
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25' 