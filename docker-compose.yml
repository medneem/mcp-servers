# docker-compose down
# docker compose up --build -d
# docker-compose down --remove-orphans && docker compose up --build -d

# Полная пересборка с игнорированием кэша
# docker compose down && docker compose build --no-cache && docker compose up -d --force-recreate

# docker compose up -d --build --remove-orphans


services:
  mcp-yandex-search:
    build:
      context: ./mcp-yandex-search
      dockerfile: Dockerfile
    container_name: mcp-yandex-search
    ports:
      - 8001:8001
    environment:
      - YANDEX_API_KEY=${YANDEX_API_KEY}
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID}
      - YANDEX_VERIFY_SSL=false
    volumes:
      - ./mcp-yandex-search/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8001/sse', timeout=5).close()"]
      interval: 30s
      timeout: 10s
      retries: 3 
      start_period: 5s

  mcp-fetch:
    build:
      context: ./mcp-fetch
      dockerfile: Dockerfile
    container_name: mcp-fetch
    ports:
      - 8002:8002
    environment:
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - FASTMCP_SERVER_PORT=8002
    restart: unless-stopped
    volumes:
      # Для разработки: синхронизация изменений кода
      - ./mcp-fetch/server.py:/app/server.py:ro
      - ./mcp-fetch/test:/app/test:ro
      # Монтируем pyproject.toml для отслеживания изменений зависимостей
      - ./mcp-fetch/pyproject.toml:/app/pyproject.toml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8002/sse', timeout=5).close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  mcp-context7:
    build:
      context: ./mcp-context7
      dockerfile: Dockerfile
    container_name: mcp-context7
    restart: unless-stopped
    ports:
     - 8003:8003
    environment:
      - PORT=8003
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY}
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - NODE_ENV=production
      - PROTOCOL=SSE
    hostname: mcp-context7
   # domainname: local
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8003/sse"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
      
  mcp-date-time:
    build:
      context: ./mcp-date-time
      dockerfile: Dockerfile
    container_name: mcp-date-time
    ports:
      - 8004:8004
    environment:
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - FASTMCP_SERVER_PORT=8004
      - TZ=Europe/Moscow
    restart: unless-stopped
    volumes:
      # Для разработки: синхронизация изменений кода
      - ./mcp-date-time/server.py:/app/server.py:ro
      # Монтируем pyproject.toml для отслеживания изменений зависимостей
      - ./mcp-date-time/pyproject.toml:/app/pyproject.toml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8004/sse', timeout=5).close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  mcp-calc:
    build:
      context: ./mcp-calc
      dockerfile: Dockerfile
    container_name: mcp-calc
    ports:
      - 8005:8005
    environment:
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - FASTMCP_SERVER_PORT=8005
    restart: unless-stopped
    volumes:
      # Для разработки: синхронизация изменений кода
      - ./mcp-calc/server.py:/app/server.py:ro
      # Монтируем pyproject.toml для отслеживания изменений зависимостей
      - ./mcp-calc/pyproject.toml:/app/pyproject.toml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://localhost:8005/sse', timeout=5).close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
