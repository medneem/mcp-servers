# docker-compose down
# docker compose up --build -d
# docker-compose down --remove-orphans && docker compose up --build -d

services:
  mcp-yandex-search:
    build:
      context: ./mcp-yandex-search
      dockerfile: Dockerfile
    container_name: mcp-yandex-search
    ports:
      - 8001:8001
    environment:
      - YANDEX_API_KEY=${YANDEX_API_KEY}
      - YANDEX_FOLDER_ID=${YANDEX_FOLDER_ID}
      - YANDEX_VERIFY_SSL=false
    volumes:
      - ./mcp-yandex-search/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8006/sse"]
      interval: 30s
      timeout: 10s
      retries: 3 

  mcp-fetch:
    build: 
      context: ./mcp-fetch
      dockerfile: Dockerfile
    container_name: mcp-fetch
    ports:
      - 8002:8002
    environment:
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - UV_SYSTEM_PYTHON=1
    restart: unless-stopped
    volumes:
      # Для разработки: синхронизация изменений кода
      - ./mcp-fetch/server.py:/app/server.py:ro
      - ./mcp-fetch/test:/app/test:ro
      # Монтируем pyproject.toml для отслеживания изменений зависимостей
      - ./mcp-fetch/pyproject.toml:/app/pyproject.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/sse/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp-context7:
    build: 
      context: ./mcp-context7 
      dockerfile: Dockerfile
    container_name: mcp-context7
    restart: unless-stopped
    ports:
      - 8003:8003
    environment:
      - PORT=8003
      - CONTEXT7_API_KEY=${CONTEXT7_API_KEY}
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Moscow
      - NODE_ENV=production
      - PROTOCOL=SSE
    hostname: mcp-context7
    # domainname: local
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/sse/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s